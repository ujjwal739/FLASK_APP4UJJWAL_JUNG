{% extends "base.html" %}
{% block title %}{{ action }} Category{% endblock %}

{% block content %}
<div style="margin-bottom:1rem">
  <a href="{{ url_for('categories.list_categories') }}" class="btn btn-secondary btn-sm">← Back to Categories</a>
</div>

<div class="form-card">
  <h2 style="margin-bottom:1.5rem;font-size:1.25rem">{{ action }} Category</h2>
  <form method="POST">
    <div class="form-group">
      <label>Category Name *</label>
      <input type="text" name="name" class="form-control" value="{{ category.name if category else '' }}" placeholder="e.g. Password Security" required>
    </div>
    <div class="form-group">
      <label>Description</label>
      <textarea name="description" class="form-control" rows="3" placeholder="Brief description of this category...">{{ category.description if category else '' }}</textarea>
    </div>
    <div class="form-group">
      <label>Icon (emoji)</label>
      <input type="text" name="icon" class="form-control" value="{{ category.icon if category else '🔒' }}" placeholder="🔒" maxlength="4">
    </div>
    <div class="btn-group">
      <button type="submit" class="btn btn-primary">{{ action }} Category</button>
      <a href="{{ url_for('categories.list_categories') }}" class="btn btn-secondary">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
