{% extends "base.html" %}
{% block title %}Register — SEC//BOARD{% endblock %}

{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <span class="logo-big">🛡️</span>
      <h2>Create Account</h2>
      <p>Join the Security Awareness Board</p>
    </div>

    <form method="POST">
      <div class="form-group">
        <label>Username</label>
        <input type="text" name="username" class="form-control" placeholder="Choose a username" required autofocus>
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" class="form-control" placeholder="your@email.com" required>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" class="form-control" placeholder="Min. 6 characters" required>
      </div>
      <div class="form-group">
        <label>Confirm Password</label>
        <input type="password" name="confirm_password" class="form-control" placeholder="Repeat password" required>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:0.75rem">
        Create Account →
      </button>
    </form>

    <div class="auth-footer" style="margin-top:1.5rem">
      Already have an account? <a href="{{ url_for('auth.user_login') }}">Sign in</a>
    </div>
  </div>
</div>
{% endblock %}
