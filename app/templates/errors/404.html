{% extends "base.html" %}
{% block title %}404 - Page Not Found{% endblock %}
{% block content %}
<div style="text-align:center;padding:6rem 2rem">
  <div style="font-size:6rem;margin-bottom:1rem">🔍</div>
  <h1 style="font-size:3rem;color:var(--accent);font-family:var(--font-mono)">404</h1>
  <p style="color:var(--text-muted);font-size:1.1rem;margin:1rem 0 2rem">Page not found. It may have been moved or deleted.</p>
  <a href="{{ url_for('home.index') }}" class="btn btn-primary">← Back to Dashboard</a>
</div>
{% endblock %}
