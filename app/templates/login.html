{% extends "base.html" %}
{% block title %}User Login — SEC//BOARD{% endblock %}

{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <span class="logo-big">🔐</span>
      <h2>Welcome Back</h2>
      <p>Sign in to your account</p>
    </div>

    <form method="POST">
      <div class="form-group">
        <label>Username</label>
        <input type="text" name="username" class="form-control" placeholder="Enter your username" required autofocus>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" class="form-control" placeholder="Enter your password" required>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:0.75rem">
        Sign In →
      </button>
    </form>

    <div class="divider">or</div>

    <div class="auth-footer">
      Don't have an account? <a href="{{ url_for('auth.register') }}">Create one</a>
    </div>
    <div class="auth-footer" style="margin-top:0.75rem">
      <a href="{{ url_for('auth.admin_login') }}" style="color:var(--text-muted);font-size:0.8rem">⚙️ Admin Login</a>
    </div>
  </div>
</div>
{% endblock %}
