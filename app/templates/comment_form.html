{% extends "base.html" %}
{% block title %}Edit Comment{% endblock %}

{% block content %}
<div style="margin-bottom:1rem">
  <a href="{{ url_for('comments.list_comments') }}" class="btn btn-secondary btn-sm">← Back to Comments</a>
</div>

<div class="form-card">
  <h2 style="margin-bottom:1.5rem;font-size:1.25rem">✏️ Edit Comment</h2>
  <form method="POST">
    <div class="form-group">
      <label>Author Name</label>
      <input type="text" name="author_name" class="form-control" value="{{ comment.author_name }}" required>
    </div>
    <div class="form-group">
      <label>Comment</label>
      <textarea name="content" class="form-control" rows="5" required>{{ comment.content }}</textarea>
    </div>
    <div class="btn-group">
      <button type="submit" class="btn btn-primary">Update Comment</button>
      <a href="{{ url_for('comments.list_comments') }}" class="btn btn-secondary">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
