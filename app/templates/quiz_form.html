{% extends "base.html" %}
{% block title %}{{ action }} Quiz Question{% endblock %}

{% block content %}
<div style="margin-bottom:1rem">
  <a href="{{ url_for('quiz.list_questions') }}" class="btn btn-secondary btn-sm">← Back to Quiz</a>
</div>

<div class="form-card">
  <h2 style="margin-bottom:1.5rem;font-size:1.25rem">{{ action }} Quiz Question</h2>
  <form method="POST">
    <div class="form-group">
      <label>Question *</label>
      <textarea name="question" class="form-control" rows="3" required>{{ question.question if question else '' }}</textarea>
    </div>
    {% for opt, letter in [('option_a','A'), ('option_b','B'), ('option_c','C'), ('option_d','D')] %}
    <div class="form-group">
      <label>Option {{ letter }} *</label>
      <input type="text" name="{{ opt }}" class="form-control" value="{{ question[opt] if question else '' }}" required>
    </div>
    {% endfor %}
    <div class="form-group">
      <label>Correct Answer *</label>
      <select name="correct_option" class="form-control" required>
        {% for opt in ['a', 'b', 'c', 'd'] %}
        <option value="{{ opt }}" {% if question and question.correct_option == opt %}selected{% endif %}>Option {{ opt.upper() }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="form-group">
      <label>Explanation</label>
      <textarea name="explanation" class="form-control" rows="3" placeholder="Why is this the correct answer?">{{ question.explanation if question else '' }}</textarea>
    </div>
    <div class="form-group">
      <label>Category</label>
      <select name="category_id" class="form-control">
        <option value="">— None —</option>
        {% for cat in categories %}
        <option value="{{ cat.id }}" {% if question and question.category_id == cat.id %}selected{% endif %}>{{ cat.name }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="form-group">
      <label>Difficulty</label>
      <select name="difficulty" class="form-control">
        {% for d in ['easy', 'medium', 'hard'] %}
        <option value="{{ d }}" {% if question and question.difficulty == d %}selected{% elif not question and d == 'medium' %}selected{% endif %}>{{ d.capitalize() }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="btn-group">
      <button type="submit" class="btn btn-primary">{{ action }} Question</button>
      <a href="{{ url_for('quiz.list_questions') }}" class="btn btn-secondary">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
